name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "What to deploy"
        required: true
        type: choice
        options:
          - frontend
          - backend
          - all

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        if: inputs.target == 'frontend' || inputs.target == 'all'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/devdigest-frontend"
          docker build -f apps/frontend/Dockerfile \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Build and push backend
        if: inputs.target == 'backend' || inputs.target == 'all'
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}/devdigest-api"
          docker build -f apps/api/Dockerfile \
            -t "$IMAGE:${{ github.sha }}" \
            -t "$IMAGE:latest" .
          docker push "$IMAGE:${{ github.sha }}"
          docker push "$IMAGE:latest"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            cd /opt/devdigest
            echo "$GITHUB_TOKEN" | docker login ${{ env.REGISTRY }} -u $GITHUB_ACTOR --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Waiting for services..."
            sleep 10
            curl -sf "https://tracker.kirrrusha.ru/api/health" && echo " Backend healthy" || echo "Backend health check failed"
